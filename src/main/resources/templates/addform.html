<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add user</title>
</head>
<body>
<h2>Add new user</h2>

<form th:action="@{/admin/add}" th:object="${user}" method="post">

    <div>
        <label>Name:</label>
        <input type="text" th:field="*{name}" required/>
    </div>

    <div>
        <label>Surname:</label>
        <input type="text" th:field="*{surname}" required/>
    </div>

    <div>
        <label>Birthday:</label>
        <input type="date" th:field="*{birthday}" required/>
    </div>

    <div>
        <label>Email:</label>
        <input type="email" th:field="*{email}" required/>
    </div>

    <div>
        <label>Can drive?</label>
        <select th:field="*{candrive}">
            <option th:value="true">Yes</option>
            <option th:value="false">No</option>
        </select>
    </div>

    <div>
        <label>Roles:</label>
        <div>
            <label>
                <input type="checkbox" name="roleNames" value="ROLE_USER"/> USER
            </label>
            <label>
                <input type="checkbox" name="roleNames" value="ROLE_ADMIN"/> ADMIN
            </label>
        </div>
    </div>

    <div>
        <label>Password:</label>
        <input type="password" th:field="*{password}" required/>
    </div>

    <button type="submit">Create user</button>
    <a th:href="@{/admin}">Cancel</a>
    <a href="/logout">Logout</a>
</form>
</body>
</html>
