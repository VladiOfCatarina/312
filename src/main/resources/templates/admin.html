<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

    <title>Admin Panel</title>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand mb-0 h1">
        Admin Panel
    </span>
    <ul class="navbar-nav px-4">
        <li class="nav-item text-nowrap">
            <a class="nav-link" href="/logout">Logout</a>
        </li>
    </ul>
</nav>

<div class="d-flex flex-fill">
    <div class="d-flex flex-column pt-3" style="width: 250px">
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a class="nav-link active" href="/admin">Admin</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/user">User</a>
            </li>
        </ul>
    </div>

    <main class="d-flex flex-column flex-fill bg-light p-4" style="min-height: 100vh">
        <h1>Admin panel</h1>
        <div th:if="${user != null}" class="mb-3">
            <p class="lead">Welcome, <span th:text="${user.name} + ' ' + ${user.surname}">Admin</span>!</p>
        </div>

        <nav>
            <div class="nav nav-tabs mb-3" id="nav-tab" role="tablist">
                <a class="nav-item nav-link active" id="nav-home-tab" data-toggle="tab" href="#nav-home"
                   role="tab" aria-controls="nav-home" aria-selected="true">Users table</a>
                <a class="nav-item nav-link" id="nav-profile-tab" data-toggle="tab" href="#nav-profile"
                   role="tab" aria-controls="nav-profile" aria-selected="false">New user</a>
            </div>
        </nav>

        <div class="tab-content" id="nav-tabContent" style="border: 1px solid #DCDFE3">
            <!-- Таблица пользователей -->
            <div id="nav-home" class="tab-pane fade show active" role="tabpanel" aria-labelledby="nav-home-tab">
                <h5 class="ms-3 mt-2 px-3">All users</h5>
                <div style="background: white;border-top: 1px solid #DCDFE3" class="p-3">
                    <table class="table table-striped table-hover" style="border-top: 1px solid #DCDFE3">
                        <thead>
                        <tr>
                            <th scope="col">ID</th>
                            <th scope="col">First Name</th>
                            <th scope="col">Last Name</th>
                            <th scope="col">Birthday</th>
                            <th scope="col">Email</th>
                            <th scope="col">Can Drive</th>
                            <th scope="col">Role</th>
                            <th scope="col">Edit</th>
                            <th scope="col">Delete</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="userItem : ${users}">
                            <td th:text="${userItem.id}">1</td>
                            <td th:text="${userItem.name}">Name</td>
                            <td th:text="${userItem.surname}">Surname</td>
                            <td th:text="${userItem.birthday}">1990-01-01</td>
                            <td th:text="${userItem.email}">email@example.com</td>
                            <td th:text="${userItem.candrive} ? 'Yes' : 'No'">Yes</td>
                            <td>
                                <span th:each="role : ${userItem.roles}" th:text="${role.name} + ' '">ROLE_USER</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/edit(id=${userItem.id})}" class="btn btn-sm btn-primary">Edit</a>
                            </td>
                            <td>
                                <a th:href="@{/admin/delete(id=${userItem.id})}"
                                   class="btn btn-sm btn-danger">Delete</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Форма добавления нового пользователя -->
            <div id="nav-profile" class="tab-pane fade" role="tabpanel" aria-labelledby="nav-profile-tab">
                <h5 class="ms-3 mt-2 px-3">Add new user</h5>
                <div style="background: white;border-top: 1px solid #DCDFE3" class="p-3">
                    <form th:action="@{/admin/add}" method="post" id="add">
                        <div class="d-flex flex-column align-items-center">
                            <label class="form-label"><b>First Name</b></label>
                            <input type="text" name="name" id="name" class="form-control w-25 mb-3"
                                   placeholder="First name" required>

                            <label class="form-label"><b>Last Name</b></label>
                            <input type="text" name="surname" id="surname" class="form-control w-25 mb-3"
                                   placeholder="Last name" required>

                            <label class="form-label"><b>Birthday</b></label>
                            <input type="date" name="birthday" id="birthday" class="form-control w-25 mb-3"
                                   placeholder="Birthday" required>

                            <label class="form-label"><b>Email</b></label>
                            <input type="email" name="email" id="email" class="form-control w-25 mb-3"
                                   placeholder="Email" required>

                            <label class="form-label"><b>Password</b></label>
                            <input type="password" name="password" id="password" class="form-control w-25 mb-3"
                                   placeholder="Password" required>

                            <label class="form-label"><b>Can Drive?</b></label>
                            <select name="candrive" class="form-control w-25 mb-3">
                                <option value="true">Yes</option>
                                <option value="false">No</option>
                            </select>

                            <label class="form-label"><b>Role</b></label>
                            <select name="roleNames" class="custom-select bd-primary w-25 mb-3" size="2"
                                    multiple="multiple">
                                <option value="ROLE_USER">USER</option>
                                <option value="ROLE_ADMIN">ADMIN</option>
                            </select>

                            <button type="submit" class="btn btn-success">Add new user</button>
                            <a href="/admin" class="btn btn-secondary mt-2">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
